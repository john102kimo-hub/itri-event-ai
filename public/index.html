<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工研院活動溝通 AI 平台</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/tabler-icons.min.css">
<style>
:root {
  --primary: #0F9E7A;
  --primary-dark: #0a7a60;
  --primary-light: rgba(15,158,122,0.08);
  --accent: #e85d04;
  --text: #1a1a2e;
  --muted: #6b7280;
  --bg: #f0f4f7;
  --card: #ffffff;
  --border: #e5e7eb;
  --radius: 12px;
  --font: 'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;
  --sidebar-w: 220px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── 登入畫面 ────────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0a2e22 0%, #0F9E7A 100%);
}
.login-card {
  background: white;
  border-radius: 20px;
  padding: 40px 36px;
  width: 380px;
  max-width: 92vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  text-align: center;
}
.login-logo { font-size: 48px; color: var(--primary); margin-bottom: 12px; }
.login-card h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
.login-card p { font-size: 0.85rem; color: var(--muted); margin-bottom: 28px; }
.login-input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-family: var(--font); font-size: 1rem;
  outline: none; transition: border-color 0.2s;
  margin-bottom: 12px;
}
.login-input:focus { border-color: var(--primary); }
.login-btn {
  width: 100%; background: var(--primary); color: white;
  border: none; border-radius: 10px;
  padding: 12px; font-family: var(--font); font-size: 1rem; font-weight: 600;
  cursor: pointer; transition: background 0.2s;
}
.login-btn:hover { background: var(--primary-dark); }
#login-error { color: #ef4444; font-size: 0.85rem; margin-top: 8px; display: none; }

/* ── 主介面 ─────────────────────────────────────────────── */
#app { display: none; }

/* 側邊欄 */
#sidebar {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: var(--sidebar-w);
  background: #0a2e22;
  color: white;
  display: flex; flex-direction: column;
  z-index: 10;
}
.sidebar-logo {
  padding: 22px 20px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-logo h2 { font-size: 0.95rem; font-weight: 700; line-height: 1.4; }
.sidebar-logo span { font-size: 0.72rem; opacity: 0.6; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px;
  font-size: 0.88rem;
  cursor: pointer;
  transition: background 0.15s;
  border-radius: 0;
  color: rgba(255,255,255,0.7);
  border: none; background: none; width: 100%; text-align: left;
  font-family: var(--font);
}
.nav-item i { font-size: 18px; }
.nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
.nav-item.active { background: var(--primary); color: white; }
.sidebar-bottom { margin-top: auto; padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
.logout-btn {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.82rem; color: rgba(255,255,255,0.5);
  cursor: pointer; background: none; border: none;
  font-family: var(--font); padding: 0;
}
.logout-btn:hover { color: rgba(255,255,255,0.8); }

/* 主內容區 */
#main {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  display: flex; flex-direction: column;
}
.topbar {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 16px 28px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 5;
}
.topbar h1 { font-size: 1.15rem; font-weight: 700; }
.topbar-actions { display: flex; gap: 10px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px;
  border-radius: 8px; border: none;
  font-family: var(--font); font-size: 0.85rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
  text-decoration: none;
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: white; color: var(--text); border: 1.5px solid var(--border); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-danger { background: #fef2f2; color: #ef4444; border: 1.5px solid #fecaca; }
.btn-danger:hover { background: #ef4444; color: white; }

.content { padding: 24px 28px; flex: 1; }

/* ── 活動卡片 ──────────────────────────────────────────── */
.events-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 18px;
}
.event-card {
  background: white;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.event-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.event-card-color { height: 5px; }
.event-card-body { padding: 18px; }
.event-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.event-name { font-size: 1rem; font-weight: 700; flex: 1; line-height: 1.4; }
.status-badge {
  font-size: 0.72rem; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
  margin-left: 8px; flex-shrink: 0;
}
.status-active { background: #d1fae5; color: #065f46; }
.status-archived { background: #f3f4f6; color: #9ca3af; }
.event-meta { font-size: 0.78rem; color: var(--muted); margin-bottom: 14px; display: flex; gap: 12px; flex-wrap: wrap; }
.event-meta span { display: flex; align-items: center; gap: 4px; }
.event-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.action-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px;
  border-radius: 8px; border: 1.5px solid var(--border);
  background: white; color: var(--text);
  font-family: var(--font); font-size: 0.8rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s; text-decoration: none;
}
.action-btn:hover { border-color: var(--primary); color: var(--primary); }
.action-btn.primary { background: var(--primary); border-color: var(--primary); color: white; }
.action-btn.primary:hover { background: var(--primary-dark); }
.action-btn.orange { background: var(--accent); border-color: var(--accent); color: white; }
.action-btn.orange:hover { background: #c44d03; }

/* 空狀態 */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--muted);
}
.empty-state i { font-size: 52px; display: block; margin-bottom: 12px; opacity: 0.3; }
.empty-state p { font-size: 0.95rem; }

/* ── 統計卡片 ──────────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
.stat-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
.stat-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
.stat-value { font-size: 1.8rem; font-weight: 800; color: var(--text); }
.stat-icon { float: right; font-size: 28px; color: var(--primary); opacity: 0.4; margin-top: -4px; }

/* ── 分析面板 ──────────────────────────────────────────── */
#analytics-view .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.keyword-cloud { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.keyword-tag {
  padding: 5px 12px; border-radius: 20px;
  font-size: 0.82rem; font-weight: 600;
  background: var(--primary-light); color: var(--primary);
  border: 1px solid rgba(15,158,122,0.2);
}
.keyword-tag.lg { font-size: 0.95rem; padding: 7px 16px; }
.keyword-tag.sm { font-size: 0.75rem; padding: 4px 10px; }
.qa-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.qa-table th { text-align: left; padding: 10px 12px; background: #f9fafb; border-bottom: 2px solid var(--border); font-size: 0.78rem; color: var(--muted); }
.qa-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
.qa-table tr:hover td { background: #f9fafb; }
.media-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.media-bar-label { font-size: 0.82rem; min-width: 80px; }
.media-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; }
.media-bar-fill { height: 100%; background: var(--primary); border-radius: 4px; }
.media-bar-count { font-size: 0.78rem; color: var(--muted); min-width: 24px; text-align: right; }

/* ── Modal ──────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal {
  background: white;
  border-radius: 16px;
  width: 600px; max-width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 28px;
}
.modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
.form-control {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: var(--font); font-size: 0.9rem;
  outline: none; transition: border-color 0.2s;
}
.form-control:focus { border-color: var(--primary); }
textarea.form-control { min-height: 200px; resize: vertical; line-height: 1.6; }
.form-hint { font-size: 0.76rem; color: var(--muted); margin-top: 4px; }
.char-count { font-size: 0.76rem; color: var(--muted); text-align: right; margin-top: 4px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.color-preview { display: inline-block; width: 20px; height: 20px; border-radius: 4px; vertical-align: middle; margin-left: 8px; border: 1px solid var(--border); }

/* Toast */
#toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #1a1a2e; color: white;
  padding: 12px 20px; border-radius: 10px;
  font-size: 0.88rem;
  z-index: 200;
  display: none;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* 載入指示器 */
.skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #e9ebee 37%, #f3f4f6 63%); background-size: 400px 100%; animation: shimmer 1.4s ease infinite; height: 180px; border-radius: var(--radius); }
@keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }

/* 響應式 */
@media (max-width: 768px) {
  #sidebar { display: none; }
  #main { margin-left: 0; }
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .events-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- 登入畫面 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><i class="ti ti-layout-dashboard"></i></div>
    <h1>工研院活動溝通 AI 平台</h1>
    <p>請輸入管理員密碼以繼續</p>
    <input class="login-input" type="password" id="pwd-input" placeholder="管理員密碼"
      onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">
      <i class="ti ti-login"></i> 登入
    </button>
    <div id="login-error">密碼錯誤，請重試</div>
  </div>
</div>

<!-- 主介面 -->
<div id="app">
  <!-- 側邊欄 -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <h2>工研院活動<br>AI 溝通平台</h2>
      <span>ITRI Event AI</span>
    </div>
    <button class="nav-item active" onclick="showView('events')">
      <i class="ti ti-calendar-event"></i> 活動管理
    </button>
    <button class="nav-item" onclick="showView('analytics')">
      <i class="ti ti-chart-bar"></i> 問答分析
    </button>
    <button class="nav-item" onclick="showView('recent')">
      <i class="ti ti-message-circle"></i> 最新問答
    </button>
    <a class="nav-item" href="/training" target="_blank" style="text-decoration:none;color:rgba(255,255,255,0.7)">
      <i class="ti ti-microphone"></i> 彙整媒體訓練
    </a>
    <div class="sidebar-bottom">
      <button class="logout-btn" onclick="logout()">
        <i class="ti ti-logout"></i> 登出
      </button>
    </div>
  </div>

  <!-- 主內容 -->
  <div id="main">
    <!-- 活動管理 -->
    <div id="view-events">
      <div class="topbar">
        <h1><i class="ti ti-calendar-event" style="color:var(--primary)"></i> 活動管理</h1>
        <div class="topbar-actions">
          <button class="btn btn-outline" onclick="loadAll()"><i class="ti ti-refresh"></i> 重整</button>
          <button class="btn btn-primary" onclick="showCreateModal()"><i class="ti ti-plus"></i> 新增活動</button>
        </div>
      </div>
      <div class="content">
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card">
            <div class="stat-icon"><i class="ti ti-calendar-event"></i></div>
            <div class="stat-label">進行中活動</div>
            <div class="stat-value" id="stat-events">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i class="ti ti-message-dots"></i></div>
            <div class="stat-label">總問答次數</div>
            <div class="stat-value" id="stat-total-qa">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i class="ti ti-building-newspaper"></i></div>
            <div class="stat-label">媒體數（填寫）</div>
            <div class="stat-value" id="stat-media">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i class="ti ti-trending-up"></i></div>
            <div class="stat-label">今日問答</div>
            <div class="stat-value" id="stat-today">—</div>
          </div>
        </div>
        <div class="events-grid" id="events-grid">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>
    </div>

    <!-- 問答分析 -->
    <div id="view-analytics" style="display:none">
      <div class="topbar">
        <h1><i class="ti ti-chart-bar" style="color:var(--primary)"></i> 問答分析</h1>
        <div class="topbar-actions">
          <select id="analytics-event-filter" class="btn btn-outline" style="font-family:var(--font);cursor:pointer">
            <option value="">全部活動</option>
          </select>
          <button class="btn btn-primary" onclick="loadAnalytics()"><i class="ti ti-refresh"></i> 更新</button>
          <button class="btn btn-outline" onclick="exportCSV()"><i class="ti ti-download"></i> 匯出 CSV</button>
        </div>
      </div>
      <div class="content" id="analytics-view">
        <div style="text-align:center;padding:60px;color:var(--muted)">
          <i class="ti ti-loader" style="font-size:32px;display:block;margin-bottom:12px"></i>
          載入中…
        </div>
      </div>
    </div>

    <!-- 最新問答 -->
    <div id="view-recent" style="display:none">
      <div class="topbar">
        <h1><i class="ti ti-message-circle" style="color:var(--primary)"></i> 最新問答</h1>
        <div class="topbar-actions">
          <button class="btn btn-outline" onclick="loadRecent()"><i class="ti ti-refresh"></i> 更新</button>
          <button class="btn btn-primary" onclick="exportCSV()"><i class="ti ti-download"></i> 匯出 CSV</button>
        </div>
      </div>
      <div class="content">
        <div style="overflow-x:auto">
          <table class="qa-table">
            <thead><tr>
              <th>時間</th><th>活動</th><th>媒體</th><th>問題</th><th style="width:40px"></th>
            </tr></thead>
            <tbody id="recent-tbody">
              <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted)">載入中…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 新增/編輯活動 Modal -->
<div id="event-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2><i class="ti ti-calendar-plus" style="color:var(--primary)"></i>
      <span id="modal-title">新增活動</span>
    </h2>
    <input type="hidden" id="edit-event-id">
    <div class="form-group">
      <label>活動名稱 *</label>
      <input class="form-control" id="input-name" placeholder="例：工研院 AI 智慧醫療大平台發表記者會">
    </div>
    <div class="form-group">
      <label>品牌主色
        <span class="color-preview" id="color-preview" style="background:#0F9E7A"></span>
      </label>
      <input class="form-control" id="input-color" placeholder="#0F9E7A" value="#0F9E7A"
        oninput="document.getElementById('color-preview').style.background=this.value">
      <div class="form-hint">輸入 HEX 色碼，例如工研院綠 #0F9E7A</div>
    </div>
    <div class="form-group">
      <label>活動知識庫（新聞稿 / 技術資料）*</label>
      <textarea class="form-control" id="input-kb"
        placeholder="貼入本次活動的新聞稿或重要資訊，AI 將根據此內容回答記者問題…"
        oninput="document.getElementById('kb-count').textContent=this.value.length+' / 8000 字'"></textarea>
      <div class="char-count" id="kb-count">0 / 8000 字</div>
      <div class="form-hint">最多可輸入 8000 字；超過建議摘要精簡，確保 AI 回答品質</div>
    </div>
    <div class="form-group">
      <label>快速問題按鈕（每行一題）</label>
      <textarea class="form-control" id="input-chips" rows="4"
        placeholder="這次活動的主要發表內容是什麼？&#10;有哪些合作廠商參與？&#10;這項技術的應用場域為何？"
        style="font-size:0.85rem"></textarea>
      <div class="form-hint">留空則使用預設通用問題；每行填一個問題，建議 3–6 題</div>
    </div>
    <div class="form-group">
      <label>圖片資源 URL（每行一個，供記者下載技術照片）</label>
      <textarea class="form-control" id="input-images" rows="3"
        placeholder="https://example.com/photo1.jpg&#10;https://example.com/photo2.png"
        style="font-size:0.85rem"></textarea>
      <div class="form-hint">貼上圖片直連 URL（需可公開存取），記者在前台可點擊放大並下載</div>
    </div>
    <div class="form-group" id="status-group" style="display:none">
      <label>狀態</label>
      <select class="form-control" id="input-status">
        <option value="active">進行中</option>
        <option value="archived">封存</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-danger" id="archive-btn" onclick="archiveEvent()" style="display:none">封存活動</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveEvent()"><i class="ti ti-check"></i> 儲存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
let state = { password: '', events: [], analytics: null };

// ── 登入 ─────────────────────────────────────────────────
async function login() {
  const pwd = document.getElementById('pwd-input').value.trim();
  if (!pwd) return;
  // 驗證：嘗試取分析資料（需要密碼）
  try {
    const res = await fetch(`/api/analytics?password=${encodeURIComponent(pwd)}`);
    if (res.status === 401) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    const data = await res.json();
    if (data.error && data.error !== '密碼錯誤') {
      // 密碼正確但可能 Sheets 未設定，仍允許登入
    }
    state.password = pwd;
    state.analytics = data;
    sessionStorage.setItem('itri_pwd', pwd);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadAll();
  } catch(e) {
    // 網路錯誤時也允許繼續（密碼先存著）
    state.password = pwd;
    sessionStorage.setItem('itri_pwd', pwd);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadAll();
  }
}

function logout() {
  sessionStorage.removeItem('itri_pwd');
  location.reload();
}

// 自動登入（Session 已有密碼）
const savedPwd = sessionStorage.getItem('itri_pwd');
if (savedPwd) {
  state.password = savedPwd;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadAll();
}

// ── 視圖切換 ─────────────────────────────────────────────
function showView(name) {
  ['events','analytics','recent'].forEach(v => {
    document.getElementById(`view-${v}`).style.display = v === name ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item')[['events','analytics','recent'].indexOf(name)].classList.add('active');
  if (name === 'analytics') loadAnalytics();
  if (name === 'recent') loadRecent();
}

// ── 載入所有資料 ──────────────────────────────────────────
async function loadAll() {
  await Promise.all([loadEvents(), loadStatsQuick()]);
}

async function loadEvents() {
  try {
    const res = await fetch('/api/events');
    const data = await res.json();
    state.events = data.events || [];
    renderEvents();
    updateEventFilter();
  } catch(e) {
    document.getElementById('events-grid').innerHTML =
      '<div style="color:#ef4444;padding:20px">載入失敗：' + e.message + '</div>';
  }
}

async function loadStatsQuick() {
  try {
    const res = await fetch(`/api/analytics?password=${encodeURIComponent(state.password)}`);
    const data = await res.json();
    if (!data.error) {
      state.analytics = data;
      updateStats(data);
    }
  } catch(e) {}
}

function updateStats(data) {
  document.getElementById('stat-events').textContent = state.events.filter(e => e.status !== 'archived').length;
  document.getElementById('stat-total-qa').textContent = data.total || 0;

  const allMedia = new Set();
  (data.by_event || []).forEach(e => (e.media_list || []).forEach(m => allMedia.add(m)));
  document.getElementById('stat-media').textContent = allMedia.size;

  const today = new Date().toLocaleDateString('zh-TW');
  const todayCount = (data.recent || []).filter(r => r.time && r.time.includes(today)).length;
  document.getElementById('stat-today').textContent = todayCount;
}

function renderEvents() {
  const grid = document.getElementById('events-grid');
  const events = state.events;
  if (!events.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <i class="ti ti-calendar-off"></i>
      <p>尚無活動，點擊「新增活動」建立第一個</p>
    </div>`;
    return;
  }

  // 取各活動問答數
  const qCount = {};
  if (state.analytics) {
    (state.analytics.by_event || []).forEach(e => qCount[e.event_id] = e.count);
  }

  grid.innerHTML = events.map(ev => {
    const count = qCount[ev.id] || 0;
    const isActive = ev.status !== 'archived';
    const color = ev.color || '#0F9E7A';
    return `
    <div class="event-card">
      <div class="event-card-color" style="background:${escHtml(color)}"></div>
      <div class="event-card-body">
        <div class="event-card-header">
          <div class="event-name">${escHtml(ev.name)}</div>
          <span class="status-badge ${isActive ? 'status-active' : 'status-archived'}">
            ${isActive ? '進行中' : '已封存'}
          </span>
        </div>
        <div class="event-meta">
          <span><i class="ti ti-message-dots"></i> ${count} 則問答</span>
          <span><i class="ti ti-calendar"></i> ${ev.created_at?.slice(0,10) || '—'}</span>
        </div>
        <div class="event-actions">
          <a class="action-btn primary" href="/event?id=${encodeURIComponent(ev.id)}" target="_blank">
            <i class="ti ti-external-link"></i> 記者前台
          </a>
          <a class="action-btn orange" href="/training?id=${encodeURIComponent(ev.id)}" target="_blank">
            <i class="ti ti-microphone"></i> 媒體訓練
          </a>
          <button class="action-btn" onclick="showAnalyticsByEvent('${escHtml(ev.id)}')">
            <i class="ti ti-chart-bar"></i> 分析
          </button>
          <button class="action-btn" onclick="exportCSV('${escHtml(ev.id)}')">
            <i class="ti ti-download"></i> 匯出
          </button>
          <button class="action-btn" onclick="showEditModal('${escHtml(ev.id)}')">
            <i class="ti ti-edit"></i> 編輯
          </button>
          <button class="action-btn" onclick="copyLink('${escHtml(ev.id)}')">
            <i class="ti ti-copy"></i> 複製連結
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── 分析 ──────────────────────────────────────────────────
function updateEventFilter() {
  const sel = document.getElementById('analytics-event-filter');
  const activeIds = new Set(state.events.map(e => e.id));
  // 從分析資料補入已封存但有問答紀錄的活動
  const archivedWithData = (state.analytics?.by_event || [])
    .filter(e => !activeIds.has(e.event_id))
    .map(e => ({ id: e.event_id, name: e.event_name + ' (已封存)' }));
  const allEvents = [...state.events, ...archivedWithData];
  sel.innerHTML = '<option value="">全部活動</option>' +
    allEvents.map(e => `<option value="${escHtml(e.id)}">${escHtml(e.name)}</option>`).join('');
}

function showAnalyticsByEvent(eventId) {
  showView('analytics');
  document.getElementById('analytics-event-filter').value = eventId;
  loadAnalytics();
}

async function deleteQA(rowNum) {
  if (!confirm('確定要刪除這筆問答紀錄嗎？')) return;
  try {
    const res = await fetch('/api/analytics', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete', row_num: rowNum, password: state.password })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    toast('已刪除');
    loadAnalytics();
  } catch(e) {
    toast('刪除失敗：' + e.message);
  }
}

async function loadAnalytics() {
  const eid = document.getElementById('analytics-event-filter').value;
  const view = document.getElementById('analytics-view');
  view.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)"><i class="ti ti-loader" style="font-size:32px;display:block;margin-bottom:12px"></i>載入中…</div>';

  try {
    const url = `/api/analytics?password=${encodeURIComponent(state.password)}${eid ? '&event_id=' + encodeURIComponent(eid) : ''}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderAnalytics(data, eid);
  } catch(e) {
    view.innerHTML = `<div style="color:#ef4444;padding:20px">載入失敗：${e.message}</div>`;
  }
}

function renderAnalytics(data, eid) {
  const maxMedia = Math.max(...(data.top_media || []).map(m => m.count), 1);
  const maxKw = data.top_keywords?.[0]?.count || 1;

  document.getElementById('analytics-view').innerHTML = `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px">
    <div style="background:white;border:1px solid var(--border);border-radius:var(--radius);padding:20px">
      <div class="section-title"><i class="ti ti-hash" style="color:var(--primary)"></i> 熱門關鍵字</div>
      ${data.top_keywords?.length ? `
      <div class="keyword-cloud">
        ${data.top_keywords.slice(0,16).map((k, i) => {
          const cls = i < 3 ? 'lg' : i < 7 ? '' : 'sm';
          return `<span class="keyword-tag ${cls}">${escHtml(k.word)} <strong>${k.count}</strong></span>`;
        }).join('')}
      </div>` : '<div style="color:var(--muted);font-size:0.85rem">尚無資料</div>'}
    </div>

    <div style="background:white;border:1px solid var(--border);border-radius:var(--radius);padding:20px">
      <div class="section-title"><i class="ti ti-building-newspaper" style="color:var(--primary)"></i> 媒體排行</div>
      ${data.top_media?.length ? data.top_media.map(m => `
      <div class="media-bar">
        <div class="media-bar-label">${escHtml(m.name)}</div>
        <div class="media-bar-track"><div class="media-bar-fill" style="width:${(m.count/maxMedia*100).toFixed(0)}%"></div></div>
        <div class="media-bar-count">${m.count}</div>
      </div>`).join('') : '<div style="color:var(--muted);font-size:0.85rem">尚無媒體填寫資料</div>'}
    </div>
  </div>

  <div style="background:white;border:1px solid var(--border);border-radius:var(--radius);padding:20px">
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
      <span><i class="ti ti-message-circle" style="color:var(--primary)"></i> 最新問答紀錄
        <span style="font-size:0.78rem;font-weight:400;color:var(--muted);margin-left:8px">共 ${data.total} 則</span>
      </span>
      <button class="btn btn-outline" style="font-size:0.78rem;padding:5px 12px" onclick="exportCSV('${eid}')">
        <i class="ti ti-download"></i> 匯出 CSV
      </button>
    </div>
    ${data.recent?.length ? `
    <div style="overflow-x:auto">
    <table class="qa-table">
      <thead><tr><th>時間</th><th>活動</th><th>媒體</th><th>問題</th><th style="width:40px"></th></tr></thead>
      <tbody>${data.recent.map(r => `
        <tr>
          <td style="white-space:nowrap;font-size:0.78rem;color:var(--muted)">${escHtml(r.time||'')}</td>
          <td style="white-space:nowrap;font-size:0.78rem">${escHtml(r.event||r.event_id||'')}</td>
          <td style="font-size:0.82rem">${escHtml(r.media||'—')}</td>
          <td>${escHtml(r.question||'')}</td>
          <td><button onclick="deleteQA(${r.row_num})" title="刪除此筆"
            style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:14px;padding:2px 6px">
            <i class="ti ti-trash"></i></button></td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>` : '<div style="color:var(--muted);font-size:0.85rem;padding:20px 0;text-align:center">尚無問答紀錄</div>'}
  </div>`;
}

async function loadRecent() {
  document.getElementById('recent-tbody').innerHTML =
    '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted)">載入中…</td></tr>';
  try {
    const res = await fetch(`/api/analytics?password=${encodeURIComponent(state.password)}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    document.getElementById('recent-tbody').innerHTML = (data.recent || []).map(r => `
      <tr>
        <td style="white-space:nowrap;font-size:0.78rem;color:var(--muted)">${escHtml(r.time||'')}</td>
        <td style="font-size:0.82rem;white-space:nowrap">${escHtml(r.event||'')}</td>
        <td style="font-size:0.82rem">${escHtml(r.media||'—')}</td>
        <td>${escHtml(r.question||'')}</td>
        <td><button onclick="deleteQARecent(${r.row_num})" title="刪除此筆"
          style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:14px;padding:2px 6px">
          <i class="ti ti-trash"></i></button></td>
      </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted)">尚無資料</td></tr>';
  } catch(e) {
    document.getElementById('recent-tbody').innerHTML =
      `<tr><td colspan="5" style="color:#ef4444;padding:20px">載入失敗：${e.message}</td></tr>`;
  }
}

async function deleteQARecent(rowNum) {
  if (!confirm('確定要刪除這筆問答紀錄嗎？')) return;
  try {
    const res = await fetch('/api/analytics', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete', row_num: rowNum, password: state.password })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    toast('已刪除');
    loadRecent();
  } catch(e) {
    toast('刪除失敗：' + e.message);
  }
}

// ── Modal ─────────────────────────────────────────────────
function showCreateModal() {
  document.getElementById('modal-title').textContent = '新增活動';
  document.getElementById('edit-event-id').value = '';
  document.getElementById('input-name').value = '';
  document.getElementById('input-color').value = '#0F9E7A';
  document.getElementById('color-preview').style.background = '#0F9E7A';
  document.getElementById('input-kb').value = '';
  document.getElementById('kb-count').textContent = '0 / 8000 字';
  document.getElementById('input-chips').value = '';
  document.getElementById('input-images').value = '';
  document.getElementById('status-group').style.display = 'none';
  document.getElementById('archive-btn').style.display = 'none';
  document.getElementById('event-modal').style.display = 'flex';
}

async function showEditModal(eventId) {
  document.getElementById('modal-title').textContent = '編輯活動';
  document.getElementById('status-group').style.display = 'block';
  document.getElementById('archive-btn').style.display = 'inline-flex';

  try {
    const res = await fetch(`/api/events?action=get&id=${encodeURIComponent(eventId)}&password=${encodeURIComponent(state.password)}`);
    const ev = await res.json();
    if (ev.error) { toast(ev.error); return; }

    document.getElementById('edit-event-id').value = ev.id;
    document.getElementById('input-name').value = ev.name || '';
    document.getElementById('input-color').value = ev.color || '#0F9E7A';
    document.getElementById('color-preview').style.background = ev.color || '#0F9E7A';
    document.getElementById('input-kb').value = ev.knowledge_base || '';
    document.getElementById('kb-count').textContent = (ev.knowledge_base?.length || 0) + ' / 8000 字';
    document.getElementById('input-chips').value = ev.chips || '';
    document.getElementById('input-images').value = ev.images || '';
    document.getElementById('input-status').value = ev.status || 'active';
    document.getElementById('event-modal').style.display = 'flex';
  } catch(e) {
    toast('載入失敗：' + e.message);
  }
}

function closeModal() {
  document.getElementById('event-modal').style.display = 'none';
}

async function saveEvent() {
  const id = document.getElementById('edit-event-id').value;
  const name = document.getElementById('input-name').value.trim();
  const color = document.getElementById('input-color').value.trim();
  const knowledge_base = document.getElementById('input-kb').value.trim();
  const chips = document.getElementById('input-chips').value.trim();
  const images = document.getElementById('input-images').value.trim();
  const status = document.getElementById('input-status').value;

  if (!name) { toast('活動名稱必填'); return; }
  if (!knowledge_base) { toast('知識庫不可為空'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader"></i> 儲存中…';

  try {
    const res = await fetch('/api/events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: id ? 'update' : 'create',
        password: state.password,
        id: id || undefined,
        name, color, knowledge_base, chips, images, status
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    closeModal();
    toast(id ? '活動已更新！' : '活動已建立！');
    await loadEvents();
  } catch(e) {
    toast('儲存失敗：' + e.message);
  }

  btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> 儲存';
}

  const id = document.getElementById('edit-event-id').value;
  if
